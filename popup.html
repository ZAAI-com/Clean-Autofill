<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MailFiller</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }
    
    .container {
      background-color: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      font-size: 20px;
      margin: 0 0 16px 0;
      color: #333;
      display: flex;
      align-items: center;
    }
    
    .icon {
      width: 24px;
      height: 24px;
      margin-right: 8px;
      background-color: #4CAF50;
      border-radius: 4px;
    }
    
    .email-preview {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 16px;
      color: #666;
      text-align: center;
      min-height: 20px;
    }
    
    button {
      width: 100%;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #45a049;
    }
    
    button:active {
      background-color: #3d8b40;
    }
    
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      color: #666;
    }
    
    .status.success {
      color: #4CAF50;
    }
    
    .status.error {
      color: #f44336;
    }
    
    .settings-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #1976d2;
      text-decoration: none;
      cursor: pointer;
    }
    
    .settings-link:hover {
      text-decoration: underline;
    }
    
    .no-domain-set {
      background-color: #fff3cd;
      color: #856404;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <div class="icon"></div>
      MailFiller
    </h1>
    
    <div id="emailPreview" class="email-preview">
      Loading...
    </div>
    
    <button id="fillButton">Fill Email</button>
    
    <div id="status" class="status"></div>
    
    <a href="#" id="settingsLink" class="settings-link">Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
